<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="FacturaQR">
  <defs>
    <linearGradient id="fqg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Mosaico de marca -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#fqg)"/>
  <!-- Glifo QR simplificado (blanco) -->
  <g fill="none" stroke="#fff" stroke-width="6">
    <rect x="21" y="21" width="21" height="21" rx="4"/>
    <rect x="58" y="21" width="21" height="21" rx="4"/>
    <rect x="21" y="58" width="21" height="21" rx="4"/>
  </g>
  <g fill="#fff">
    <rect x="28" y="28" width="7" height="7" rx="1.5"/>
    <rect x="65" y="28" width="7" height="7" rx="1.5"/>
    <rect x="28" y="65" width="7" height="7" rx="1.5"/>
    <!-- Módulos de datos (esquina inferior derecha, para equilibrio) -->
    <rect x="58" y="58" width="8" height="8" rx="1.5"/>
    <rect x="71" y="58" width="8" height="8" rx="1.5"/>
    <rect x="58" y="71" width="8" height="8" rx="1.5"/>
    <rect x="71" y="71" width="8" height="8" rx="1.5"/>
  </g>
</svg>
